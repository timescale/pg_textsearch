name: CI

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'test/**'
      - 'sql/**'
      - 'Makefile'
      - 'pg_textsearch.control'
      - '.clang-format'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'test/**'
      - 'sql/**'
      - 'Makefile'
      - 'pg_textsearch.control'
      - '.clang-format'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pg_version: [17, 18]

    steps:
    - uses: actions/checkout@v4

    - name: Install PostgreSQL ${{ matrix.pg_version }}
      run: |
        sudo apt-get update
        sudo apt-get install -y wget ca-certificates
        wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
        echo "deb http://apt.postgresql.org/pub/repos/apt/ $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
        sudo apt-get update
        sudo apt-get install -y postgresql-${{ matrix.pg_version }} postgresql-server-dev-${{ matrix.pg_version }}

    - name: Install TimescaleDB
      run: |
        # Add TimescaleDB apt repository
        echo "deb https://packagecloud.io/timescale/timescaledb/ubuntu/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/timescaledb.list
        wget --quiet -O - https://packagecloud.io/timescale/timescaledb/gpgkey | sudo apt-key add -
        sudo apt-get update
        # Install TimescaleDB for the specific PostgreSQL version
        sudo apt-get install -y timescaledb-2-postgresql-${{ matrix.pg_version }} || echo "TimescaleDB installation failed, hypertable tests will be skipped"

    - name: Install build dependencies
      run: |
        sudo apt-get install -y build-essential bc

    - name: Start PostgreSQL
      run: |
        sudo systemctl start postgresql
        sudo -u postgres createuser -s $USER
        sudo -u postgres createdb $USER

    - name: Build extension
      run: |
        export PATH="/usr/lib/postgresql/${{ matrix.pg_version }}/bin:$PATH"
        make clean
        # Build with -Werror via PG_CFLAGS (CFLAGS is overridden by pgxs)
        make PG_CFLAGS="-Werror -Wno-error=unused-parameter"
        sudo env "PATH=$PATH" make install

    - name: Run regression tests
      timeout-minutes: 10
      run: |
        export PATH="/usr/lib/postgresql/${{ matrix.pg_version }}/bin:$PATH"
        # Verify extension is installed
        echo "Checking if pg_textsearch.so is installed..."
        ls -la /usr/lib/postgresql/${{ matrix.pg_version }}/lib/pg_textsearch.so

        # Run the test setup manually since extension is already installed
        rm -rf tmp_check_shared
        mkdir -p tmp_check_shared
        initdb -D tmp_check_shared/data --auth-local=trust --auth-host=trust
        LIB_NAME="pg_textsearch"
        echo "port = 55433" >> tmp_check_shared/data/postgresql.conf
        echo "log_statement = 'all'" >> tmp_check_shared/data/postgresql.conf
        echo "shared_buffers = 256MB" >> tmp_check_shared/data/postgresql.conf
        echo "max_connections = 20" >> tmp_check_shared/data/postgresql.conf
        echo "shared_preload_libraries = 'timescaledb,${LIB_NAME}'" >> tmp_check_shared/data/postgresql.conf || true
        echo "unix_socket_directories = '$PWD/tmp_check_shared'" >> tmp_check_shared/data/postgresql.conf

        # Try to start PostgreSQL and show logs if it fails
        if ! pg_ctl start -D tmp_check_shared/data -l tmp_check_shared/data/logfile -w; then
          echo "PostgreSQL failed to start. Log contents:"
          cat tmp_check_shared/data/logfile
          exit 1
        fi

        createdb -h $PWD/tmp_check_shared -p 55433 contrib_regression
        if ! make installcheck PGHOST=$PWD/tmp_check_shared PGPORT=55433; then
          echo "Tests failed. Showing regression diffs:"
          if [ -f test/regression.diffs ]; then
            cat test/regression.diffs
          fi
          echo "PostgreSQL server log (last 200 lines):"
          tail -200 tmp_check_shared/data/logfile || true
          pg_ctl stop -D tmp_check_shared/data -l tmp_check_shared/data/logfile || true
          rm -rf tmp_check_shared || true
          exit 1
        fi
        pg_ctl stop -D tmp_check_shared/data -l tmp_check_shared/data/logfile
        rm -rf tmp_check_shared

    - name: Run shell-based tests
      timeout-minutes: 25
      run: |
        export PATH="/usr/lib/postgresql/${{ matrix.pg_version }}/bin:$PATH"

        # concurrency.sh and segment.sh manage their own PostgreSQL instances
        echo "Running concurrency tests..."
        if (cd test/scripts && ./concurrency.sh); then
          echo "✓ Concurrency tests passed"
        else
          echo "✗ Concurrency tests failed"
          exit 1
        fi
        echo "Running VACUUM concurrency tests..."
        if (cd test/scripts && ./vacuum_concurrent_merge.sh); then
          echo "✓ VACUUM concurrency tests passed"
        else
          echo "✗ VACUUM concurrency tests failed"
          exit 1
        fi
        echo "Running segment tests..."
        if (cd test/scripts && ./segment.sh); then
          echo "✓ Segment tests passed"
        else
          echo "✗ Segment tests failed"
          exit 1
        fi
        echo "Running crash recovery tests..."
        if (cd test/scripts && ./recovery.sh); then
          echo "✓ Crash recovery tests passed"
        else
          echo "✗ Crash recovery tests failed"
          exit 1
        fi
        echo "Running deferred-reclaim crash recovery tests (#380)..."
        if (cd test/scripts && ./standby_reclaim.sh); then
          echo "✓ Deferred-reclaim crash recovery tests passed"
        else
          echo "✗ Deferred-reclaim crash recovery tests failed"
          exit 1
        fi
        echo "Running shutdown spill tests..."
        if (cd test/scripts && ./shutdown_spill.sh); then
          echo "✓ Shutdown spill tests passed"
        else
          echo "✗ Shutdown spill tests failed"
          exit 1
        fi
        echo "Running CREATE INDEX CONCURRENTLY tests..."
        if (cd test/scripts && ./cic.sh); then
          echo "✓ CIC tests passed"
        else
          echo "✗ CIC tests failed"
          exit 1
        fi
        echo "Running multi-index / multi-user / multi-schema tests..."
        if (cd test/scripts && ./multi_index.sh); then
          echo "✓ Multi-index tests passed"
        else
          echo "✗ Multi-index tests failed"
          exit 1
        fi
        echo "Running replication tests..."
        if (cd test/scripts && ./replication.sh); then
          echo "✓ Replication tests passed"
        else
          echo "✗ Replication tests failed"
          exit 1
        fi
        echo "Running spill-paths replication tests..."
        if (cd test/scripts && ./replication_spill_paths.sh); then
          echo "✓ Spill-paths replication tests passed"
        else
          echo "✗ Spill-paths replication tests failed"
          exit 1
        fi
        echo "Running standby segment-reclaim acceptance tests (#380)..."
        if (cd test/scripts && ./replication_segment_reclaim.sh); then
          echo "✓ Standby segment-reclaim tests passed"
        else
          echo "✗ Standby segment-reclaim tests failed"
          exit 1
        fi
        echo "Running WAL audit tests..."
        if (cd test/scripts && ./wal_audit.sh); then
          echo "✓ WAL audit tests passed"
        else
          echo "✗ WAL audit tests failed"
          exit 1
        fi

        # hypertable.sh needs a PostgreSQL instance with TimescaleDB preloaded
        echo "Running hypertable tests..."
        LIB_NAME="pg_textsearch"
        rm -rf tmp_hypertable_test
        mkdir -p tmp_hypertable_test
        initdb -D tmp_hypertable_test/data --auth-local=trust --auth-host=trust
        echo "port = 55435" >> tmp_hypertable_test/data/postgresql.conf
        echo "shared_buffers = 256MB" >> tmp_hypertable_test/data/postgresql.conf
        echo "shared_preload_libraries = 'timescaledb,${LIB_NAME}'" >> tmp_hypertable_test/data/postgresql.conf || true
        echo "unix_socket_directories = '$PWD/tmp_hypertable_test'" >> tmp_hypertable_test/data/postgresql.conf
        pg_ctl start -D tmp_hypertable_test/data -l tmp_hypertable_test/data/logfile -w

        export PGHOST=$PWD/tmp_hypertable_test
        export PGPORT=55435
        if (cd test/scripts && ./hypertable.sh); then
          echo "✓ Hypertable tests passed"
        else
          echo "✗ Hypertable tests failed"
          pg_ctl stop -D tmp_hypertable_test/data || true
          rm -rf tmp_hypertable_test
          exit 1
        fi
        pg_ctl stop -D tmp_hypertable_test/data
        rm -rf tmp_hypertable_test

    - name: Upload test results on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-pg${{ matrix.pg_version }}
        path: |
          test/regression.diffs
          test/regression.out
          test/results/
        retention-days: 7


  build-test-multiple-configs:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { cc: gcc, pg_version: 17 }
          - { cc: clang, pg_version: 17 }
          - { cc: gcc, pg_version: 18 }
          - { cc: clang, pg_version: 18 }

    steps:
    - uses: actions/checkout@v4

    - name: Install PostgreSQL and build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y wget ca-certificates build-essential bc
        wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
        echo "deb http://apt.postgresql.org/pub/repos/apt/ $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
        sudo apt-get update
        sudo apt-get install -y postgresql-${{ matrix.config.pg_version }} postgresql-server-dev-${{ matrix.config.pg_version }}

    - name: Build with ${{ matrix.config.cc }}
      run: |
        export PATH="/usr/lib/postgresql/${{ matrix.config.pg_version }}/bin:$PATH"
        export CC=${{ matrix.config.cc }}
        make clean
        # Build with -Werror via PG_CFLAGS (CFLAGS is overridden by pgxs)
        make PG_CFLAGS="-Werror -Wno-error=unused-parameter"

  performance-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install PostgreSQL 17
      run: |
        sudo apt-get update
        sudo apt-get install -y wget ca-certificates build-essential bc
        wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
        echo "deb http://apt.postgresql.org/pub/repos/apt/ $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
        sudo apt-get update
        sudo apt-get install -y postgresql-17 postgresql-server-dev-17

    - name: Start PostgreSQL
      run: |
        sudo systemctl start postgresql
        sudo -u postgres createuser -s $USER
        sudo -u postgres createdb $USER

    - name: Build and install extension
      run: |
        export PATH="/usr/lib/postgresql/17/bin:$PATH"
        make clean && make && sudo make install

    - name: Run performance benchmarks
      timeout-minutes: 20
      run: |
        export PATH="/usr/lib/postgresql/17/bin:$PATH"
        # Run larger concurrency test for performance validation
        echo "Running performance benchmarks..."
        cd test/scripts && TEST_SIZE_MULTIPLIER=5.0 ./concurrency.sh

    - name: Upload performance results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: performance-results
        path: |
          test/tmp_concurrent_test/postgres.log
        retention-days: 7

  format-check:
    name: Check C Code Formatting
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install clang-format
      run: pip install clang-format==21.1.8

    - name: Check formatting
      run: |
        # Find all C source and header files
        find src -name "*.c" -o -name "*.h" | while read file; do
          echo "Checking $file"
          if ! clang-format --dry-run --Werror "$file" > /dev/null 2>&1; then
            echo "❌ $file is not properly formatted"
            echo "Expected format:"
            clang-format "$file"
            exit 1
          else
            echo "✅ $file is properly formatted"
          fi
        done

    - name: Suggest formatting command
      if: failure()
      run: |
        echo ""
        echo "To fix formatting issues, run:"
        echo "  make format"
        echo ""
        echo "Or format individual files:"
        echo "  clang-format -i src/filename.c"

  sanitizer:
    name: PG${{ matrix.pg }} Sanitizer
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        pg: ["17.2", "18.1"]

    env:
      PG_SRC_DIR: "pgbuild"
      PG_INSTALL_DIR: "postgresql"
      extra_packages: "clang-15 llvm-15"
      CC: "clang-15"
      CXX: "clang-15"
      CFLAGS: "-g -fsanitize=address,undefined -fno-omit-frame-pointer -Og -fno-inline-functions"
      CXXFLAGS: "-g -fsanitize=address,undefined -fno-omit-frame-pointer -Og -fno-inline-functions"
      LDFLAGS: "-fsanitize=address,undefined"
      ASAN_OPTIONS: "detect_leaks=0 abort_on_error=1 exitcode=27 log_path=${{ github.workspace }}/sanitizer_logs/asan print_stacktrace=1 check_initialization_order=1"
      UBSAN_OPTIONS: "halt_on_error=1 exitcode=27 print_stacktrace=1 log_path=${{ github.workspace }}/sanitizer_logs/ubsan print_summary=1"

    steps:
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y flex bison build-essential libssl-dev \
          libreadline-dev systemd-coredump gdb ${{ env.extra_packages }}

    - name: Checkout
      uses: actions/checkout@v4

    - name: Create sanitizer logs directory
      run: mkdir -p ${{ github.workspace }}/sanitizer_logs

    - name: Get date for caching
      id: get-date
      run: echo "date=$(date +\"%d\")" >> $GITHUB_OUTPUT

    - name: Cache PostgreSQL ${{ matrix.pg }}
      id: cache-postgresql
      uses: actions/cache@v4
      with:
        path: ~/${{ env.PG_SRC_DIR }}
        key: "Sanitizer-postgresql-${{ matrix.pg }}-${{ env.CC }}-${{ steps.get-date.outputs.date }}-${{ hashFiles('.github/**') }}"

    - name: Build PostgreSQL ${{ matrix.pg }} with sanitizers
      if: steps.cache-postgresql.outputs.cache-hit != 'true'
      run: |
        wget -q -O postgresql.tar.bz2 \
          https://ftp.postgresql.org/pub/source/v${{ matrix.pg }}/postgresql-${{ matrix.pg }}.tar.bz2
        mkdir -p ~/$PG_SRC_DIR
        tar --extract --file postgresql.tar.bz2 --directory ~/$PG_SRC_DIR --strip-components 1

        # Add instrumentation to the Postgres memory contexts.
        # PG18 moved stack_is_too_deep() to a different file, so we need
        # different patches for PG17 vs PG18+.
        # For more details, see:
        # https://github.com/timescale/eng-database/wiki/Using-Address-Sanitizer
        PG_MAJOR=$(echo "${{ matrix.pg }}" | sed -e 's![.].*!!')
        if [ ${PG_MAJOR} -lt 18 ]; then
          echo "Applying PG17 ASAN patch..."
          patch -F5 -p1 -d ~/$PG_SRC_DIR < test/postgres-asan-instrumentation.patch
        else
          echo "Applying PG18+ ASAN patch..."
          patch -F5 -p1 -d ~/$PG_SRC_DIR < test/postgres-asan-instrumentation-PG18GE.patch
        fi

        cd ~/$PG_SRC_DIR
        ./configure --prefix=$HOME/$PG_INSTALL_DIR --enable-debug --enable-cassert \
          --with-openssl --without-readline --without-zlib --without-libxml
        make -j$(nproc)

    - name: Install PostgreSQL ${{ matrix.pg }}
      run: |
        cd ~/$PG_SRC_DIR
        make install
        ~/$PG_INSTALL_DIR/bin/pg_config --version

    - name: Verify sanitizers are enabled
      run: |
        export PATH="$HOME/$PG_INSTALL_DIR/bin:$PATH"
        echo "Verifying PostgreSQL was built with sanitizers..."

        # Check if postgres binary contains sanitizer symbols
        echo "Checking for AddressSanitizer symbols..."
        if nm ~/$PG_INSTALL_DIR/bin/postgres | grep -i asan > /dev/null; then
          echo "AddressSanitizer symbols found in postgres binary"
        else
          echo "AddressSanitizer symbols NOT found in postgres binary"
          echo "This suggests PostgreSQL was not built with -fsanitize=address"
          exit 1
        fi

        # Test that sanitizers are actually working by triggering a known issue
        echo "Testing sanitizer detection with intentional buffer overflow..."
        cat > test_sanitizer.c << 'EOF'
        #include <stdio.h>
        #include <stdlib.h>
        int main() {
            char *buf = malloc(10);
            buf[10] = 'x';  // Buffer overflow - should be caught by AddressSanitizer
            free(buf);
            return 0;
        }
        EOF

        # Compile and run test - should fail with sanitizer error
        $CC $CFLAGS test_sanitizer.c -o test_sanitizer
        if ./test_sanitizer; then
          echo "WARNING: Sanitizer test did not catch buffer overflow!"
        else
          echo "Sanitizer correctly caught buffer overflow (exit code $?)"
        fi
        rm -f test_sanitizer test_sanitizer.c

    - name: Build and install pg_textsearch
      run: |
        export PATH="$HOME/$PG_INSTALL_DIR/bin:$PATH"
        make clean
        make
        make install

    - name: Run regression tests
      run: |
        export PATH="$HOME/$PG_INSTALL_DIR/bin:$PATH"

        # Set up test database
        rm -rf tmp_sanitizer_test
        mkdir -p tmp_sanitizer_test
        initdb -D tmp_sanitizer_test/data --auth-local=trust

        # Configure PostgreSQL
        LIB_NAME="pg_textsearch"
        echo "port = 55433" >> tmp_sanitizer_test/data/postgresql.conf
        echo "unix_socket_directories = '$PWD/tmp_sanitizer_test'" >> tmp_sanitizer_test/data/postgresql.conf
        echo "shared_preload_libraries = '${LIB_NAME}'" >> tmp_sanitizer_test/data/postgresql.conf

        # Start PostgreSQL
        pg_ctl start -D tmp_sanitizer_test/data -l tmp_sanitizer_test/data/logfile -w

        # Create test database and run tests
        createdb -h $PWD/tmp_sanitizer_test -p 55433 contrib_regression

        echo "Running SQL regression tests under sanitizer..."
        make installcheck PGHOST=$PWD/tmp_sanitizer_test PGPORT=55433

        # Run shell-based tests under sanitizer (more likely to find memory issues)
        echo "Running concurrency tests under sanitizer..."
        timeout 1200s bash -c "
          export PATH=\"$HOME/$PG_INSTALL_DIR/bin:\$PATH\"
          export PGHOST=$PWD/tmp_sanitizer_test
          export PGPORT=55433
          cd test/scripts && ./concurrency.sh
        "

        echo "Running crash recovery tests under sanitizer..."
        timeout 600s bash -c "
          export PATH=\"$HOME/$PG_INSTALL_DIR/bin:\$PATH\"
          export PGHOST=$PWD/tmp_sanitizer_test
          export PGPORT=55433
          cd test/scripts && ./recovery.sh
        "

        # Deferred-reclaim crash recovery (issue #380): parks displaced
        # segment pages, crashes (immediate stop), asserts WAL replay
        # reconstructs the tombstone chain.  Spins up its own instance;
        # under ASan a use-after-recycle of a displaced page trips here.
        echo "Running deferred-reclaim crash recovery tests under sanitizer..."
        timeout 600s bash -c "
          export PATH=\"$HOME/$PG_INSTALL_DIR/bin:\$PATH\"
          cd test/scripts && ./standby_reclaim.sh
        "

        echo "Running shutdown spill tests under sanitizer..."
        timeout 600s bash -c "
          export PATH=\"$HOME/$PG_INSTALL_DIR/bin:\$PATH\"
          export PGHOST=$PWD/tmp_sanitizer_test
          export PGPORT=55433
          cd test/scripts && ./shutdown_spill.sh
        "

        echo "Running multi-backend segment tests under sanitizer..."
        timeout 1200s bash -c "
          export PATH=\"$HOME/$PG_INSTALL_DIR/bin:\$PATH\"
          export PGHOST=$PWD/tmp_sanitizer_test
          export PGPORT=55433
          cd test/scripts && ./segment.sh
        "

        echo "Running CREATE INDEX CONCURRENTLY tests under sanitizer..."
        timeout 600s bash -c "
          export PATH=\"$HOME/$PG_INSTALL_DIR/bin:\$PATH\"
          export PGHOST=$PWD/tmp_sanitizer_test
          export PGPORT=55433
          cd test/scripts && ./cic.sh
        "

        echo "Running multi-index / multi-user / multi-schema tests under sanitizer..."
        timeout 600s bash -c "
          export PATH=\"$HOME/$PG_INSTALL_DIR/bin:\$PATH\"
          export PGHOST=$PWD/tmp_sanitizer_test
          export PGPORT=55433
          cd test/scripts && ./multi_index.sh
        "

        # Standby segment-reclaim acceptance (issue #380): a live standby
        # snapshot with hot_standby_feedback=on holds the primary's
        # reclaim horizon so a merge+VACUUM keeps displaced pages parked,
        # and the standby reads cleanly across merge replay.  Spins up its
        # own primary + standby; under ASan, recycling a page out from
        # under the standby read surfaces as a use-after-recycle.
        echo "Running standby segment-reclaim acceptance tests under sanitizer..."
        timeout 1200s bash -c "
          export PATH=\"$HOME/$PG_INSTALL_DIR/bin:\$PATH\"
          cd test/scripts && ./replication_segment_reclaim.sh
        "

        # Clean up
        pg_ctl stop -D tmp_sanitizer_test/data -l tmp_sanitizer_test/data/logfile

    - name: Collect sanitizer reports
      if: always()
      run: |
        echo "Collecting all sanitizer logs..."
        find ${{ github.workspace }}/sanitizer_logs -type f 2>/dev/null | \
          head -20 | while read file; do
          echo "=== $file ==="
          head -100 "$file" 2>/dev/null || echo "(file not readable or empty)"
          echo
        done

    - name: Upload sanitizer logs and test artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: sanitizer-logs-pg${{ matrix.pg }}
        path: |
          ${{ github.workspace }}/sanitizer_logs/
          test/regression.diffs
          test/regression.out
          test/results/
          tmp_sanitizer_test/data/logfile
        retention-days: 7

    - name: Upload failure artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: sanitizer-failure-debug-pg${{ matrix.pg }}
        path: |
          tmp_sanitizer_test/
          test/scripts/tmp_*
        retention-days: 7

  coverage:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install PostgreSQL 17
      run: |
        sudo apt-get update
        sudo apt-get install -y wget ca-certificates gnupg
        wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/postgresql-archive-keyring.gpg] http://apt.postgresql.org/pub/repos/apt/ $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
        sudo apt-get update
        sudo apt-get install -y postgresql-17 postgresql-server-dev-17

    - name: Install TimescaleDB
      run: |
        echo "deb https://packagecloud.io/timescale/timescaledb/ubuntu/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/timescaledb.list
        wget --quiet -O - https://packagecloud.io/timescale/timescaledb/gpgkey | sudo apt-key add -
        sudo apt-get update
        sudo apt-get install -y timescaledb-2-postgresql-17 || echo "TimescaleDB installation failed, hypertable tests will be skipped"

    - name: Install coverage tools
      run: |
        sudo apt-get install -y lcov build-essential bc

    - name: Build extension with coverage instrumentation
      run: |
        export PATH="/usr/lib/postgresql/17/bin:$PATH"
        make clean
        # Build with coverage flags - disable optimization for accurate line counts
        make PG_CFLAGS="--coverage -O0 -g" SHLIB_LINK="--coverage"
        sudo env "PATH=$PATH" make install

    - name: Setup test database
      run: |
        export PATH="/usr/lib/postgresql/17/bin:$PATH"
        LIB_NAME="pg_textsearch"
        rm -rf tmp_check_shared
        mkdir -p tmp_check_shared
        initdb -D tmp_check_shared/data --auth-local=trust --auth-host=trust
        echo "port = 55433" >> tmp_check_shared/data/postgresql.conf
        echo "log_statement = 'all'" >> tmp_check_shared/data/postgresql.conf
        echo "shared_buffers = 256MB" >> tmp_check_shared/data/postgresql.conf
        echo "max_connections = 20" >> tmp_check_shared/data/postgresql.conf
        echo "shared_preload_libraries = '${LIB_NAME}'" >> tmp_check_shared/data/postgresql.conf
        echo "unix_socket_directories = '$PWD/tmp_check_shared'" >> tmp_check_shared/data/postgresql.conf
        pg_ctl start -D tmp_check_shared/data -l tmp_check_shared/data/logfile -w
        createdb -h $PWD/tmp_check_shared -p 55433 contrib_regression

    - name: Zero coverage counters
      run: |
        lcov --zerocounters --directory .

    - name: Run SQL regression tests
      run: |
        export PATH="/usr/lib/postgresql/17/bin:$PATH"
        make test PGHOST=$PWD/tmp_check_shared PGPORT=55433 || true
        # Stop and restart Postgres to flush coverage data from backend
        pg_ctl stop -D tmp_check_shared/data -l tmp_check_shared/data/logfile
        pg_ctl start -D tmp_check_shared/data -l tmp_check_shared/data/logfile -w

    - name: Run shell-based tests
      timeout-minutes: 10
      run: |
        export PATH="/usr/lib/postgresql/17/bin:$PATH"
        # Run all shell-based tests for coverage.
        # Each spawns its own Postgres instance; the coverage-
        # instrumented .so writes gcda data to the build dir.
        (cd test/scripts && ./concurrency.sh) || true
        (cd test/scripts && ./segment.sh) || true
        (cd test/scripts && ./recovery.sh) || true
        (cd test/scripts && ./standby_reclaim.sh) || true
        (cd test/scripts && ./shutdown_spill.sh) || true
        (cd test/scripts && ./cic.sh) || true
        (cd test/scripts && ./multi_index.sh) || true
        (cd test/scripts && ./replication.sh) || true
        (cd test/scripts && ./replication_spill_paths.sh) || true
        (cd test/scripts && ./replication_segment_reclaim.sh) || true
        (cd test/scripts && ./wal_audit.sh) || true

    - name: Stop PostgreSQL and flush coverage
      run: |
        export PATH="/usr/lib/postgresql/17/bin:$PATH"
        pg_ctl stop -D tmp_check_shared/data -l tmp_check_shared/data/logfile || true

    - name: Run hypertable tests (exercises CustomScan code paths)
      timeout-minutes: 5
      run: |
        export PATH="/usr/lib/postgresql/17/bin:$PATH"
        LIB_NAME="pg_textsearch"
        rm -rf tmp_hypertable_test
        mkdir -p tmp_hypertable_test
        initdb -D tmp_hypertable_test/data --auth-local=trust --auth-host=trust
        echo "port = 55434" >> tmp_hypertable_test/data/postgresql.conf
        echo "shared_buffers = 256MB" >> tmp_hypertable_test/data/postgresql.conf
        echo "shared_preload_libraries = 'timescaledb,${LIB_NAME}'" >> tmp_hypertable_test/data/postgresql.conf
        echo "unix_socket_directories = '$PWD/tmp_hypertable_test'" >> tmp_hypertable_test/data/postgresql.conf
        pg_ctl start -D tmp_hypertable_test/data -l tmp_hypertable_test/data/logfile -w
        export PGHOST=$PWD/tmp_hypertable_test
        export PGPORT=55434
        (cd test/scripts && ./hypertable.sh) || true
        pg_ctl stop -D tmp_hypertable_test/data || true
        rm -rf tmp_hypertable_test

    - name: Run upgrade compat test (v6 metapage → in-place upgrade path)
      timeout-minutes: 5
      run: |
        export PATH="/usr/lib/postgresql/17/bin:$PATH"
        export PG_CONFIG="/usr/lib/postgresql/17/bin/pg_config"
        LIB_NAME="pg_textsearch"

        # Download and build v1.0.0 (V4 segment + v6 metapage) WITHOUT
        # coverage flags.  Used to seed an index whose on-disk format is
        # the pre-1.3.0 layout; we then upgrade the binary and exercise
        # the v6→v7 metapage in-place upgrade path plus REINDEX-from-
        # heap as a fallback.
        curl -fsSL -o /tmp/old.tar.gz \
          "https://github.com/timescale/pg_textsearch/releases/download/v1.0.0/pg_textsearch-1.0.0.tar.gz"
        tar -xzf /tmp/old.tar.gz -C /tmp
        (cd /tmp/pg_textsearch-1.0.0 && make clean && make && sudo make install)

        # Start PG with old binary and create a v6-metapage index with
        # V4 segments.
        rm -rf tmp_upgrade_cov
        mkdir -p tmp_upgrade_cov
        initdb -D tmp_upgrade_cov/data --auth-local=trust --auth-host=trust
        echo "port = 55435" >> tmp_upgrade_cov/data/postgresql.conf
        echo "shared_buffers = 256MB" >> tmp_upgrade_cov/data/postgresql.conf
        echo "shared_preload_libraries = '${LIB_NAME}'" >> tmp_upgrade_cov/data/postgresql.conf
        echo "unix_socket_directories = '$PWD/tmp_upgrade_cov'" >> tmp_upgrade_cov/data/postgresql.conf
        pg_ctl start -D tmp_upgrade_cov/data -l tmp_upgrade_cov/data/logfile -w
        createdb -h $PWD/tmp_upgrade_cov -p 55435 upgrade_cov

        psql -h $PWD/tmp_upgrade_cov -p 55435 -d upgrade_cov -c \
          "CREATE EXTENSION pg_textsearch VERSION '1.0.0';"
        psql -h $PWD/tmp_upgrade_cov -p 55435 -d upgrade_cov << 'SQL'
        CREATE TABLE docs (id SERIAL PRIMARY KEY, content TEXT NOT NULL);
        INSERT INTO docs (content)
        SELECT CASE (g % 4)
          WHEN 0 THEN 'database query optimization'
          WHEN 1 THEN 'text search ranking algorithm'
          WHEN 2 THEN 'machine learning neural network'
          WHEN 3 THEN 'distributed systems consensus'
        END || ' doc ' || g FROM generate_series(1, 100) g;
        CREATE INDEX idx ON docs USING bm25 (content)
          WITH (text_config = 'english');
        INSERT INTO docs (content)
        SELECT 'extra terms for spill segment ' || g
        FROM generate_series(1, 50) g;
        SELECT bm25_spill_index('idx');
        SQL

        # Stop PG, install coverage-instrumented current version
        pg_ctl stop -D tmp_upgrade_cov/data -w

        SHAREDIR=$($PG_CONFIG --sharedir)
        sudo rm -f "$SHAREDIR/extension/pg_textsearch--"*.sql
        sudo env "PATH=$PATH" make install

        pg_ctl start -D tmp_upgrade_cov/data -l tmp_upgrade_cov/data/logfile -w

        # Exercise v6-metapage in-place upgrade + REINDEX path.
        # Issue #383: the 1.3.0 binary now reads v6 metapages in place
        # (byte-identical prefix), normalizes the new chain head/tail
        # fields, and lazily upgrades to the current version on the
        # first metapage write.  This step exercises the read path, the
        # ALTER EXTENSION UPDATE, an INSERT that triggers the in-place
        # v6→v8 upgrade via memtable_bootstrap_and_append, and finally
        # a REINDEX (still supported as the fallback recovery path)
        # plus VACUUM and force_merge.
        psql -h $PWD/tmp_upgrade_cov -p 55435 -d upgrade_cov << 'SQL'
        \set ON_ERROR_STOP on

        -- Pre-ALTER: queries against the v6 index should succeed
        -- (in-place compat read; no REINDEX required).
        DO $$
        DECLARE n bigint;
        BEGIN
          SELECT count(*) INTO n FROM (
            SELECT 1 FROM docs
            ORDER BY content <@> to_bm25query('database', 'idx')
            LIMIT 10) sub;
          IF n = 0 THEN
            RAISE EXCEPTION 'FAIL: pre-ALTER v6 query returned 0 rows';
          END IF;
          RAISE NOTICE 'PASS: pre-ALTER v6 index queryable, n=%', n;
        END $$;

        -- Read-only queries MUST NOT upgrade the on-disk metapage
        -- (issue #383 contract: tp_get_metapage normalizes a v6
        -- page in its palloc'd copy but does not mutate the
        -- buffer).  Regression here would mean the read path
        -- accidentally emits a write.
        DO $$
        DECLARE dump_text text;
        BEGIN
          dump_text := bm25_dump_index('idx');
          IF dump_text NOT LIKE '%version: 6' || E'\n' || '%' THEN
            RAISE EXCEPTION
              'FAIL: metapage upgraded by read-only queries; '
              'expected version: 6, dump excerpt: %',
              substr(dump_text, 1, 400);
          END IF;
          RAISE NOTICE 'PASS: read-only queries left v6 metapage intact';
        END $$;

        ALTER EXTENSION pg_textsearch UPDATE;

        -- INSERT triggers memtable_bootstrap_and_append, which
        -- runs tp_metapage_upgrade_to_current() inside its
        -- GenericXLog record.  Validates that the v6→v8 in-place
        -- upgrade landed on disk.
        INSERT INTO docs (content) VALUES
          ('compat upgrade insert one'),
          ('compat upgrade insert two');

        DO $$
        DECLARE dump_text text;
        BEGIN
          dump_text := bm25_dump_index('idx');
          IF dump_text NOT LIKE '%version: 8' || E'\n' || '%' THEN
            RAISE EXCEPTION
              'FAIL: metapage not upgraded to v8 after INSERT; '
              'dump excerpt: %', substr(dump_text, 1, 400);
          END IF;
          RAISE NOTICE 'PASS: in-place v6→v8 upgrade after first write';
        END $$;

        -- REINDEX is still supported as the operator fallback;
        -- exercise the build-from-heap codepath for coverage.
        REINDEX INDEX idx;

        -- V7/V5 reading post-REINDEX
        SELECT count(*) FROM (
          SELECT 1 FROM docs
          ORDER BY content <@> to_bm25query('search ranking', 'idx')
          LIMIT 10) sub;

        -- VACUUM with alive bitset on V5 segments
        DELETE FROM docs WHERE id <= 20;
        VACUUM docs;

        SELECT count(*) FROM (
          SELECT 1 FROM docs
          ORDER BY content <@> to_bm25query('database', 'idx')
          LIMIT 10) sub;

        -- Merge V5 segments
        SELECT bm25_force_merge('idx');

        SELECT count(*) FROM (
          SELECT 1 FROM docs
          ORDER BY content <@> to_bm25query('optimization', 'idx')
          LIMIT 10) sub;
        SQL

        pg_ctl stop -D tmp_upgrade_cov/data || true
        rm -rf tmp_upgrade_cov /tmp/pg_textsearch-1.0.0 /tmp/old.tar.gz

    - name: Capture coverage data
      run: |
        # Capture coverage from all .gcda files
        lcov --capture \
             --directory . \
             --output-file coverage.info \
             --base-directory $PWD \
             --no-external \
             --ignore-errors mismatch

        # Remove test files from coverage report (we only care about src/)
        lcov --remove coverage.info \
             '*/test/*' \
             '*/tmp_check_shared/*' \
             --output-file coverage.info \
             --ignore-errors unused

        # Show summary
        lcov --list coverage.info

    - name: Restore coverage baseline
      if: github.event_name == 'pull_request'
      uses: actions/cache/restore@v4
      with:
        path: coverage-baseline.txt
        key: coverage-baseline-never-matches
        restore-keys: |
          coverage-baseline-

    - name: Coverage gate
      id: coverage-gate
      run: |
        # Read old baseline if available (before we overwrite it)
        BASELINE=""
        if [ -f coverage-baseline.txt ]; then
          BASELINE=$(cat coverage-baseline.txt)
        fi

        # Extract current line coverage percentage
        CURRENT=$(lcov --summary coverage.info 2>&1 \
          | grep "lines" | sed 's/.*: \([0-9.]*\)%.*/\1/')
        echo "Current line coverage: ${CURRENT}%"
        echo "line_coverage=$CURRENT" >> "$GITHUB_OUTPUT"

        # Save current value as baseline for future runs
        echo "$CURRENT" > coverage-baseline.txt

        # Enforce minimum coverage threshold
        MIN_COVERAGE=85
        if (( $(echo "$CURRENT < $MIN_COVERAGE" | bc -l) )); then
          echo "::error::Line coverage ${CURRENT}% is below" \
               "minimum ${MIN_COVERAGE}%"
          exit 1
        fi
        echo "Coverage ${CURRENT}% meets minimum ${MIN_COVERAGE}%"

        # Check for coverage reduction on PRs
        if [ -n "$BASELINE" ]; then
          DIFF=$(echo "$CURRENT - $BASELINE" | bc -l)
          echo "Baseline: ${BASELINE}%, Change: ${DIFF}%"
          # Tolerance relaxed to -3% to absorb the one-time drop from
          # the v6 metapage REINDEX-rejection design (issue #374,
          # Batch 1): the V4 segment reader is no longer reachable
          # post-1.3.0 because v6 indexes ERROR before any segment
          # data is touched, requiring REINDEX -> V5 segments.
          # Follow-up: physically delete V4 reader (then tighten
          # this back to -1%).
          if (( $(echo "$DIFF < -3.0" | bc -l) )); then
            echo "::error::Coverage decreased by more than 3%:" \
                 "${BASELINE}% -> ${CURRENT}% (change: ${DIFF}%)"
            exit 1
          fi
          echo "Coverage change (${DIFF}%) within threshold"
        else
          echo "No baseline found, skipping reduction check"
        fi

    - name: Save coverage baseline
      if: github.ref == 'refs/heads/main'
      uses: actions/cache/save@v4
      with:
        path: coverage-baseline.txt
        key: coverage-baseline-${{ github.sha }}

    - name: Generate HTML report
      run: |
        genhtml coverage.info \
                --output-directory coverage-html \
                --title "pg_textsearch Coverage" \
                --legend \
                --show-details

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.info
        fail_ci_if_error: true
        verbose: true

    - name: Upload HTML coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage-html/
        retention-days: 30

    - name: Upload lcov info file
      uses: actions/upload-artifact@v4
      with:
        name: coverage-lcov
        path: coverage.info
        retention-days: 30

    - name: Cleanup
      if: always()
      run: |
        export PATH="/usr/lib/postgresql/17/bin:$PATH"
        pg_ctl stop -D tmp_check_shared/data -l tmp_check_shared/data/logfile || true
        rm -rf tmp_check_shared

    - name: Coverage summary
      run: |
        echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Download the HTML report from the artifacts to see detailed line-by-line coverage." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        # Extract and display summary stats
        if [ -f coverage.info ]; then
          echo '```' >> $GITHUB_STEP_SUMMARY
          lcov --summary coverage.info 2>&1 | tail -10 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        fi

  pgspot:
    name: Check Extension SQL
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install pgspot
      run: pip install pgspot

    - name: Run pgspot
      run: |
        # Check the current version's base install SQL file
        VERSION=$(awk -F"'" '/default_version/ {print $2}' pg_textsearch.control)
        echo "Checking sql/pg_textsearch--${VERSION}.sql"
        pgspot "sql/pg_textsearch--${VERSION}.sql"

  # Umbrella job for branch protection rules
  all-tests-passed:
    runs-on: ubuntu-latest
    needs: [test, build-test-multiple-configs, performance-test, format-check, sanitizer, coverage, pgspot]
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more jobs were cancelled"
            exit 1
          fi
          echo "All checks passed!"
