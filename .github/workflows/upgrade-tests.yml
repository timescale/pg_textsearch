name: Upgrade Tests

on:
  workflow_dispatch:
    inputs:
      target_version:
        description: 'Target version to test upgrades to (leave empty for current branch)'
        required: false
        type: string
  pull_request:
    paths:
      - 'sql/**'
      - 'src/segment/**'
      - 'pg_textsearch.control'
      - '.github/workflows/upgrade-tests.yml'
  schedule:
    # Run weekly on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'

jobs:
  test-upgrades:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg_version: [17, 18]
        old_version: ['0.2.0', '0.3.0', '0.4.0', '0.4.1', '0.4.2', '0.5.0', '0.5.1', '0.6.0', '0.6.1', '1.0.0']

    steps:
    - name: Checkout current code
      uses: actions/checkout@v4

    - name: Install PostgreSQL ${{ matrix.pg_version }}
      run: |
        sudo apt-get update
        sudo apt-get install -y wget ca-certificates gnupg
        sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
        wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
        sudo apt-get update
        sudo apt-get install -y postgresql-${{ matrix.pg_version }} postgresql-server-dev-${{ matrix.pg_version }}
        sudo systemctl stop postgresql

    - name: Download old release v${{ matrix.old_version }}
      run: |
        # Download the source tarball from GitHub releases
        DOWNLOAD_URL="https://github.com/timescale/pg_textsearch/releases/download/v${{ matrix.old_version }}/pg_textsearch-${{ matrix.old_version }}.tar.gz"
        echo "Downloading from: $DOWNLOAD_URL"
        if curl -fsSL -o pg_textsearch-old.tar.gz "$DOWNLOAD_URL"; then
          tar -xzf pg_textsearch-old.tar.gz
          ls -la
        else
          echo "::error::Failed to download v${{ matrix.old_version }}"
          exit 1
        fi

    - name: Build and install old version v${{ matrix.old_version }}
      run: |
        cd pg_textsearch-${{ matrix.old_version }}
        export PG_CONFIG=/usr/lib/postgresql/${{ matrix.pg_version }}/bin/pg_config
        make clean || true
        make
        sudo make install

    - name: Start PostgreSQL with old binary and create test data
      run: |
        export PATH=/usr/lib/postgresql/${{ matrix.pg_version }}/bin:$PATH
        export PGDATA=/tmp/upgrade_test_data
        LIB_NAME="pg_textsearch"

        initdb -D $PGDATA
        echo "shared_buffers = 256MB" >> $PGDATA/postgresql.conf
        echo "port = 5432" >> $PGDATA/postgresql.conf
        echo "unix_socket_directories = '/tmp'" >> $PGDATA/postgresql.conf
        echo "shared_preload_libraries = '${LIB_NAME}'" >> $PGDATA/postgresql.conf

        pg_ctl -D $PGDATA start -w -l $PGDATA/logfile
        createdb -h /tmp upgrade_test

    - name: Install old extension and create test data
      run: |
        export PATH=/usr/lib/postgresql/${{ matrix.pg_version }}/bin:$PATH

        # CREATE EXTENSION needs GHA variable; use -c to avoid
        # shell-expanding $$ in the heredoc SQL that follows.
        psql -h /tmp -d upgrade_test -c \
          "CREATE EXTENSION pg_textsearch VERSION '${{ matrix.old_version }}';"

        psql -h /tmp -d upgrade_test << 'SQL'
        \set ON_ERROR_STOP on

        SELECT extversion AS old_version
        FROM pg_extension WHERE extname = 'pg_textsearch';

        CREATE TABLE upgrade_docs (
          id SERIAL PRIMARY KEY,
          content TEXT NOT NULL
        );

        -- Batch 1: 120 rows across 8 topic clusters
        INSERT INTO upgrade_docs (content)
        SELECT CASE (g % 8)
          WHEN 0 THEN 'PostgreSQL database management and query optimization'
          WHEN 1 THEN 'full text search engine with BM25 relevance ranking'
          WHEN 2 THEN 'machine learning classification using neural networks'
          WHEN 3 THEN 'distributed computing consensus protocols replication'
          WHEN 4 THEN 'programming language compiler design type inference'
          WHEN 5 THEN 'cloud infrastructure container orchestration deploy'
          WHEN 6 THEN 'database indexing strategies for analytical workloads'
          WHEN 7 THEN 'search engine document scoring with term weighting'
        END || ' document ' || g
        FROM generate_series(1, 120) g;

        -- Build batch 1 into segment 0
        CREATE INDEX idx_upgrade_bm25 ON upgrade_docs
          USING bm25 (content) WITH (text_config = 'english');
        SQL

        # Compat tier (>= 0.5.1): add batch 2, spill, capture baselines
        if dpkg --compare-versions "${{ matrix.old_version }}" ge "0.5.1"; then
          psql -h /tmp -d upgrade_test << 'SQL'
          \set ON_ERROR_STOP on

          -- Batch 2: 80 rows (will be spilled to segment 1)
          INSERT INTO upgrade_docs (content)
          SELECT CASE (g % 8)
            WHEN 0 THEN 'relational database storage engine buffer management'
            WHEN 1 THEN 'information retrieval term scoring document ranking'
            WHEN 2 THEN 'deep learning optimization gradient descent training'
            WHEN 3 THEN 'network protocol design for distributed messaging'
            WHEN 4 THEN 'functional programming immutable data composition'
            WHEN 5 THEN 'serverless computing event driven scaling patterns'
            WHEN 6 THEN 'query planner cost estimation and join ordering'
            WHEN 7 THEN 'lexical analysis tokenization for search indexing'
          END || ' entry ' || g
          FROM generate_series(1, 80) g;

          -- Spill batch 2 to create segment 1
          SELECT bm25_spill_index('idx_upgrade_bm25');

          -- Helper: exact comparison against a baseline table
          CREATE FUNCTION validate_baseline(
            query_terms text, baseline_tbl text, label text
          ) RETURNS void AS $$
          DECLARE
            diff_count int;
          BEGIN
            EXECUTE format(
              'CREATE TEMP TABLE _vb AS
               SELECT id,
                      content <@> to_bm25query(%L, ''idx_upgrade_bm25'') AS score
               FROM upgrade_docs
               ORDER BY content <@> to_bm25query(%L, ''idx_upgrade_bm25''), id
               LIMIT 10',
              query_terms, query_terms
            );
            EXECUTE format(
              'SELECT count(*) FROM (
                 (SELECT id, score FROM %I
                  EXCEPT ALL
                  SELECT id, score FROM _vb)
                 UNION ALL
                 (SELECT id, score FROM _vb
                  EXCEPT ALL
                  SELECT id, score FROM %I)
               ) d', baseline_tbl, baseline_tbl
            ) INTO diff_count;
            DROP TABLE _vb;
            IF diff_count > 0 THEN
              RAISE EXCEPTION 'FAIL [%]: % differences vs baseline',
                label, diff_count;
            END IF;
            RAISE NOTICE 'PASS [%]: results match baseline', label;
          END;
          $$ LANGUAGE plpgsql;

          -- Helper: verify no deleted rows appear, all scores valid
          CREATE FUNCTION validate_post_delete(
            query_terms text, max_deleted_id int, label text
          ) RETURNS void AS $$
          DECLARE
            bad_count int;
            result_count int;
            bad_score float8;
          BEGIN
            EXECUTE format(
              'CREATE TEMP TABLE _vd AS
               SELECT id,
                      content <@> to_bm25query(%L, ''idx_upgrade_bm25'') AS score
               FROM upgrade_docs
               ORDER BY content <@> to_bm25query(%L, ''idx_upgrade_bm25''), id
               LIMIT 10',
              query_terms, query_terms
            );
            SELECT count(*) INTO bad_count FROM _vd
            WHERE id <= max_deleted_id;
            IF bad_count > 0 THEN
              DROP TABLE _vd;
              RAISE EXCEPTION 'FAIL [%]: % deleted rows in results',
                label, bad_count;
            END IF;
            SELECT count(*) INTO result_count FROM _vd;
            IF result_count = 0 THEN
              DROP TABLE _vd;
              RAISE EXCEPTION 'FAIL [%]: query returned no results', label;
            END IF;
            SELECT max(score) INTO bad_score FROM _vd WHERE score >= 0;
            IF bad_score IS NOT NULL THEN
              DROP TABLE _vd;
              RAISE EXCEPTION 'FAIL [%]: non-negative score: %',
                label, bad_score;
            END IF;
            DROP TABLE _vd;
            RAISE NOTICE 'PASS [%]: % results, no deleted rows, valid scores',
              label, result_count;
          END;
          $$ LANGUAGE plpgsql;
        SQL
        fi

    - name: Stop PostgreSQL, install current version, restart
      run: |
        export PATH=/usr/lib/postgresql/${{ matrix.pg_version }}/bin:$PATH
        export PG_CONFIG=/usr/lib/postgresql/${{ matrix.pg_version }}/bin/pg_config
        export PGDATA=/tmp/upgrade_test_data

        # Stop Postgres (still running old binary)
        pg_ctl -D $PGDATA stop -w

        # Remove old extension SQL files before installing current version,
        # otherwise stale shortcut upgrade scripts (e.g., 0.5.0--1.0.0.sql)
        # from the old release remain and Postgres may pick them over the
        # linear chain, causing version-check failures.
        SHAREDIR=$($PG_CONFIG --sharedir)
        sudo rm -f "$SHAREDIR/extension/pg_textsearch--"*.sql

        # Build and install current version (overwrites old binary)
        cd $GITHUB_WORKSPACE
        make clean
        make
        sudo make install

        # Restart with new binary
        pg_ctl -D $PGDATA start -w -l $PGDATA/logfile

    - name: Verify queries before ALTER EXTENSION (compat tier)
      run: |
        export PATH=/usr/lib/postgresql/${{ matrix.pg_version }}/bin:$PATH

        if dpkg --compare-versions "${{ matrix.old_version }}" ge "0.5.1"; then
          echo "=== Testing new binary reads old segments (pre-ALTER EXTENSION) ==="
          psql -h /tmp -d upgrade_test << 'SQL'
          \set ON_ERROR_STOP on

          -- Extension version should still be the old one
          DO $$
          DECLARE ver text;
          BEGIN
            SELECT extversion INTO ver
            FROM pg_extension WHERE extname = 'pg_textsearch';
            RAISE NOTICE 'Extension version (pre-ALTER): %', ver;
          END $$;

          -- Verify queries work with new binary on old segments.
          -- Capture baselines here (post-restart) because recovery
          -- rebuilds the memtable which can change corpus statistics.
          CREATE TABLE baseline_q1 AS
          SELECT id,
                 content <@> to_bm25query('database', 'idx_upgrade_bm25') AS score
          FROM upgrade_docs
          ORDER BY content <@> to_bm25query('database', 'idx_upgrade_bm25'), id
          LIMIT 10;

          CREATE TABLE baseline_q2 AS
          SELECT id,
                 content <@> to_bm25query('search ranking', 'idx_upgrade_bm25') AS score
          FROM upgrade_docs
          ORDER BY content <@> to_bm25query('search ranking', 'idx_upgrade_bm25'), id
          LIMIT 10;

          CREATE TABLE baseline_q3 AS
          SELECT id,
                 content <@> to_bm25query('optimization', 'idx_upgrade_bm25') AS score
          FROM upgrade_docs
          ORDER BY content <@> to_bm25query('optimization', 'idx_upgrade_bm25'), id
          LIMIT 10;

          -- Verify results are valid (non-empty, negative scores)
          DO $$
          DECLARE cnt int; bad float8;
          BEGIN
            SELECT count(*) INTO cnt FROM baseline_q1;
            IF cnt = 0 THEN
              RAISE EXCEPTION 'FAIL: pre-alter q1 returned no results';
            END IF;
            SELECT max(score) INTO bad FROM baseline_q1 WHERE score >= 0;
            IF bad IS NOT NULL THEN
              RAISE EXCEPTION 'FAIL: pre-alter q1 non-negative score: %', bad;
            END IF;
            RAISE NOTICE 'PASS: pre-alter baselines captured (% results)', cnt;
          END $$;

          SELECT 'baseline_q1' AS query, * FROM baseline_q1;
          SELECT 'baseline_q2' AS query, * FROM baseline_q2;
          SELECT 'baseline_q3' AS query, * FROM baseline_q3;
        SQL
        else
          echo "Legacy tier: skipping pre-ALTER verification"
        fi

    - name: Upgrade extension to current version
      run: |
        export PATH=/usr/lib/postgresql/${{ matrix.pg_version }}/bin:$PATH

        if dpkg --compare-versions "${{ matrix.old_version }}" ge "0.5.1"; then
          echo "=== Compat tier: ALTER EXTENSION UPDATE (no REINDEX) ==="
          psql -h /tmp -d upgrade_test << 'SQL'
          \set ON_ERROR_STOP on
          ALTER EXTENSION pg_textsearch UPDATE;
          SELECT extversion AS new_version
          FROM pg_extension WHERE extname = 'pg_textsearch';
        SQL
        else
          echo "=== Legacy tier: ALTER EXTENSION UPDATE + REINDEX ==="
          psql -h /tmp -d upgrade_test << 'SQL'
          \set ON_ERROR_STOP on
          ALTER EXTENSION pg_textsearch UPDATE;
          SELECT extversion AS new_version
          FROM pg_extension WHERE extname = 'pg_textsearch';
          REINDEX INDEX idx_upgrade_bm25;
        SQL
        fi

    - name: Verify upgrade succeeded
      run: |
        export PATH=/usr/lib/postgresql/${{ matrix.pg_version }}/bin:$PATH
        EXPECTED_VERSION=$(awk -F"'" '/^[\t ]*default_version/ {print $2}' \
          pg_textsearch.control | cut -d. -f1,2)

        if dpkg --compare-versions "${{ matrix.old_version }}" ge "0.5.1"; then
          echo "=== Compat tier: multi-phase segment validation ==="
          psql -h /tmp -d upgrade_test \
            -v expected_version="$EXPECTED_VERSION" << 'SQL'
          \set ON_ERROR_STOP on

          -- Phase 1: Post-ALTER EXTENSION — old segments, new SQL
          SELECT validate_baseline('database',       'baseline_q1', 'post-alter q1');
          SELECT validate_baseline('search ranking', 'baseline_q2', 'post-alter q2');
          SELECT validate_baseline('optimization',   'baseline_q3', 'post-alter q3');

          -- Phase 2: DELETE + VACUUM — alive bitset on old-format segments
          -- Delete ~20% of rows (40 of 200, 5 per topic cluster in batch 1)
          DELETE FROM upgrade_docs WHERE id <= 40;
          VACUUM upgrade_docs;

          SELECT validate_post_delete('database',       40, 'post-vacuum q1');
          SELECT validate_post_delete('search ranking', 40, 'post-vacuum q2');
          SELECT validate_post_delete('optimization',   40, 'post-vacuum q3');

          -- Phase 3: force_merge — merges old segments into V5
          SELECT bm25_force_merge('idx_upgrade_bm25');

          SELECT validate_post_delete('database',       40, 'post-merge q1');
          SELECT validate_post_delete('search ranking', 40, 'post-merge q2');
          SELECT validate_post_delete('optimization',   40, 'post-merge q3');

          -- Phase 4: INSERT new data alongside merged segments
          INSERT INTO upgrade_docs (content) VALUES
            ('newly inserted document about database query testing'),
            ('another new document with search ranking verification');

          DO $$
          DECLARE rec record;
          BEGIN
            SELECT * INTO rec FROM upgrade_docs
            ORDER BY content <@> to_bm25query('newly inserted', 'idx_upgrade_bm25')
            LIMIT 1;
            IF rec.id IS NULL THEN
              RAISE EXCEPTION 'FAIL: new data not searchable after merge';
            END IF;
            RAISE NOTICE 'PASS: new data searchable, id=%', rec.id;
          END $$;

          -- Phase 5: Version check
          CREATE TEMP TABLE _expected(version_prefix text);
          INSERT INTO _expected VALUES (:'expected_version');

          DO $$
          DECLARE ver text; expected text;
          BEGIN
            SELECT version_prefix INTO expected FROM _expected;
            SELECT extversion INTO ver
            FROM pg_extension WHERE extname = 'pg_textsearch';
            IF ver NOT LIKE expected || '%' THEN
              RAISE EXCEPTION 'FAIL: version %, expected %*', ver, expected;
            END IF;
            RAISE NOTICE 'PASS: extension version %', ver;
          END $$;

          -- Phase 6: 1.1.0 features (text[] indexes, bm25_memory_usage).
          -- Catches upgrade scripts that forget new SQL objects added
          -- during a release cycle.
          CREATE TABLE upgrade_textarr (id serial, tags text[]);
          INSERT INTO upgrade_textarr (tags) VALUES (ARRAY['hello', 'world']);
          CREATE INDEX idx_upgrade_textarr ON upgrade_textarr
            USING bm25 (tags) WITH (text_config = 'english');
          DO $$
          DECLARE rec record;
          BEGIN
            SET LOCAL enable_seqscan = off;
            SELECT * INTO rec FROM upgrade_textarr
            ORDER BY tags <@> to_bm25query('hello', 'idx_upgrade_textarr')
            LIMIT 1;
            IF rec.id IS NULL THEN
              RAISE EXCEPTION 'FAIL: text[] index returned no results';
            END IF;
            RAISE NOTICE 'PASS: text[] BM25 index works, id=%', rec.id;
          END $$;
          DO $$
          DECLARE bytes int8;
          BEGIN
            SELECT dsa_total_bytes INTO bytes FROM bm25_memory_usage();
            IF bytes IS NULL THEN
              RAISE EXCEPTION 'FAIL: bm25_memory_usage returned NULL';
            END IF;
            RAISE NOTICE 'PASS: bm25_memory_usage works, bytes=%', bytes;
          END $$;

          SELECT 'All compat-tier upgrade tests passed!' AS status;
        SQL

        else
          echo "=== Legacy tier: standard verification ==="
          psql -h /tmp -d upgrade_test \
            -v expected_version="$EXPECTED_VERSION" << 'SQL'
          \set ON_ERROR_STOP on

          CREATE TEMP TABLE _expected(version_prefix text);
          INSERT INTO _expected VALUES (:'expected_version');

          -- Test 1: Version check
          DO $$
          DECLARE ver text; expected text;
          BEGIN
            SELECT version_prefix INTO expected FROM _expected;
            SELECT extversion INTO ver
            FROM pg_extension WHERE extname = 'pg_textsearch';
            IF ver NOT LIKE expected || '%' THEN
              RAISE EXCEPTION 'FAIL: version %, expected %*', ver, expected;
            END IF;
            RAISE NOTICE 'PASS: extension version %', ver;
          END $$;

          -- Test 2: BM25 index scan works
          DO $$
          DECLARE rec record;
          BEGIN
            SELECT * INTO rec FROM upgrade_docs
            ORDER BY content <@> to_bm25query('database', 'idx_upgrade_bm25')
            LIMIT 1;
            IF rec.id IS NULL THEN
              RAISE EXCEPTION 'FAIL: query returned no results';
            END IF;
            RAISE NOTICE 'PASS: BM25 query works, id=%', rec.id;
          END $$;

          -- Test 3: Scores are negative
          DO $$
          DECLARE score_val float8;
          BEGIN
            SELECT content <@> to_bm25query('database', 'idx_upgrade_bm25')
            INTO score_val
            FROM upgrade_docs
            ORDER BY 1 LIMIT 1;
            IF score_val IS NULL OR score_val >= 0 THEN
              RAISE EXCEPTION 'FAIL: score should be negative, got %',
                score_val;
            END IF;
            RAISE NOTICE 'PASS: scoring correct, score=%', score_val;
          END $$;

          -- Test 4: Index scan is used
          EXPLAIN (COSTS OFF)
          SELECT * FROM upgrade_docs
          ORDER BY content <@> to_bm25query('database', 'idx_upgrade_bm25')
          LIMIT 5;

          -- Test 5: Insert new data
          INSERT INTO upgrade_docs (content) VALUES
            ('New document added after upgrade to test index updates');

          DO $$
          DECLARE rec record;
          BEGIN
            SELECT * INTO rec FROM upgrade_docs
            ORDER BY content <@> to_bm25query('upgrade', 'idx_upgrade_bm25')
            LIMIT 1;
            IF rec.id IS NULL THEN
              RAISE EXCEPTION 'FAIL: could not find newly inserted document';
            END IF;
            RAISE NOTICE 'PASS: new document searchable, id=%', rec.id;
          END $$;

          -- Test 6: New index after upgrade
          CREATE TABLE post_upgrade_docs (content TEXT);
          INSERT INTO post_upgrade_docs VALUES
            ('Testing post-upgrade index creation');
          CREATE INDEX idx_post_upgrade ON post_upgrade_docs
            USING bm25 (content) WITH (text_config = 'english');

          DO $$
          DECLARE score_val float8;
          BEGIN
            SELECT content <@> to_bm25query('testing', 'idx_post_upgrade')
            INTO score_val
            FROM post_upgrade_docs
            ORDER BY 1 LIMIT 1;
            IF score_val IS NULL OR score_val >= 0 THEN
              RAISE EXCEPTION 'FAIL: new index query failed, score=%',
                score_val;
            END IF;
            RAISE NOTICE 'PASS: new index works, score=%', score_val;
          END $$;

          -- Test 7: 1.1.0 features (text[] indexes, bm25_memory_usage).
          -- Catches upgrade scripts that forget new SQL objects added
          -- during a release cycle.
          CREATE TABLE upgrade_textarr (id serial, tags text[]);
          INSERT INTO upgrade_textarr (tags) VALUES (ARRAY['hello', 'world']);
          CREATE INDEX idx_upgrade_textarr ON upgrade_textarr
            USING bm25 (tags) WITH (text_config = 'english');
          DO $$
          DECLARE rec record;
          BEGIN
            SET LOCAL enable_seqscan = off;
            SELECT * INTO rec FROM upgrade_textarr
            ORDER BY tags <@> to_bm25query('hello', 'idx_upgrade_textarr')
            LIMIT 1;
            IF rec.id IS NULL THEN
              RAISE EXCEPTION 'FAIL: text[] index returned no results';
            END IF;
            RAISE NOTICE 'PASS: text[] BM25 index works, id=%', rec.id;
          END $$;
          DO $$
          DECLARE bytes int8;
          BEGIN
            SELECT dsa_total_bytes INTO bytes FROM bm25_memory_usage();
            IF bytes IS NULL THEN
              RAISE EXCEPTION 'FAIL: bm25_memory_usage returned NULL';
            END IF;
            RAISE NOTICE 'PASS: bm25_memory_usage works, bytes=%', bytes;
          END $$;

          SELECT 'All legacy-tier upgrade tests passed!' AS status;
        SQL
        fi

    - name: Cleanup
      if: always()
      run: |
        export PATH=/usr/lib/postgresql/${{ matrix.pg_version }}/bin:$PATH
        pg_ctl -D /tmp/upgrade_test_data stop -m immediate || true
        rm -rf /tmp/upgrade_test_data

  # Note: v0.1.0 incompatible upgrade test was removed because
  # shared_preload_libraries is now required. The v0.1.0 extension SQL
  # references functions (e.g., bm25_get_current_score) that no longer exist
  # in the current binary. Upgrades from v0.2.0+ are tested in test-upgrades.

  # Test clean install (no upgrade) on both PG versions
  test-clean-install:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pg_version: [17, 18]

    steps:
    - name: Checkout current code
      uses: actions/checkout@v4

    - name: Install PostgreSQL ${{ matrix.pg_version }}
      run: |
        sudo apt-get update
        sudo apt-get install -y wget ca-certificates gnupg
        sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
        wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
        sudo apt-get update
        sudo apt-get install -y postgresql-${{ matrix.pg_version }} postgresql-server-dev-${{ matrix.pg_version }}
        sudo systemctl stop postgresql

    - name: Build and install
      run: |
        export PG_CONFIG=/usr/lib/postgresql/${{ matrix.pg_version }}/bin/pg_config
        make clean
        make
        sudo make install

    - name: Test clean installation
      run: |
        export PATH=/usr/lib/postgresql/${{ matrix.pg_version }}/bin:$PATH
        export PGDATA=/tmp/clean_test_data
        LIB_NAME="pg_textsearch"

        initdb -D $PGDATA
        echo "port = 5432" >> $PGDATA/postgresql.conf
        echo "unix_socket_directories = '/tmp'" >> $PGDATA/postgresql.conf
        echo "shared_preload_libraries = '${LIB_NAME}'" >> $PGDATA/postgresql.conf

        pg_ctl -D $PGDATA start -w -l $PGDATA/logfile
        createdb -h /tmp clean_test

        psql -h /tmp -d clean_test << 'SQL'
        CREATE EXTENSION pg_textsearch;

        -- Verify version
        SELECT extversion FROM pg_extension WHERE extname = 'pg_textsearch';

        -- Basic functionality test
        CREATE TABLE docs (id SERIAL PRIMARY KEY, content TEXT);
        INSERT INTO docs (content) VALUES
          ('PostgreSQL full text search'),
          ('BM25 ranking algorithm'),
          ('Document retrieval system');

        CREATE INDEX idx_docs ON docs USING bm25 (content) WITH (text_config = 'english');

        -- Test query
        SELECT id, content <@> 'search ranking'::text AS score
        FROM docs
        ORDER BY score
        LIMIT 3;

        RAISE NOTICE 'Clean installation test passed!';
        SQL

        pg_ctl -D $PGDATA stop -m immediate
        rm -rf $PGDATA
